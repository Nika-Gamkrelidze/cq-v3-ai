services:
  db:
    image: pgvector/pgvector:pg16
    container_name: cq-db
    environment:
      POSTGRES_USER: cq
      POSTGRES_PASSWORD: cq
      POSTGRES_DB: cq
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro,z
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro,z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cq -d cq"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Self-hosted multilingual embeddings (BAAI/bge-m3) — no external API key.
  # Downloads the model on first start into the cached volume (~2 GB).
  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.6
    container_name: cq-embeddings
    command: ["--model-id", "BAAI/bge-m3", "--port", "80"]
    volumes:
      - hf_cache:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 300s
    restart: unless-stopped

  api:
    build: ./backend
    container_name: cq-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://cq:cq@db:5432/cq
      EMBEDDING_BASE_URL: http://embeddings:80
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  web:
    image: nginx:alpine
    container_name: cq-web
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    # Lets nginx reach the host-side push-to-deploy webhook receiver (127.0.0.1:9000
    # on the host) via host.docker.internal, so the hook is served over port 80/443.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./frontend/public:/usr/share/nginx/html:ro,z
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro,z
      # TLS certs (Let's Encrypt, copied here by the renewal deploy-hook; git-ignored).
      - ./deploy/certs:/etc/nginx/certs:ro,z
    restart: unless-stopped

volumes:
  pgdata:
  hf_cache:
