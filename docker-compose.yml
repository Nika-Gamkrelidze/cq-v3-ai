services:
  db:
    image: pgvector/pgvector:pg16
    container_name: cq-db
    environment:
      POSTGRES_USER: cq
      POSTGRES_PASSWORD: cq
      POSTGRES_DB: cq
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro,z
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro,z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cq -d cq"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build: ./backend
    container_name: cq-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://cq:cq@db:5432/cq
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  web:
    image: nginx:alpine
    container_name: cq-web
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./frontend/public:/usr/share/nginx/html:ro,z
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro,z
    restart: unless-stopped

volumes:
  pgdata:
