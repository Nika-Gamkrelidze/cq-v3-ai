services:
  db:
    image: pgvector/pgvector:pg16
    container_name: cq-db
    environment:
      POSTGRES_USER: cq
      POSTGRES_PASSWORD: cq
      POSTGRES_DB: cq
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro,z
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro,z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cq -d cq"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build: ./backend
    container_name: cq-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://cq:cq@db:5432/cq
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: cq-caddy
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro,z
      - ./frontend/public:/srv:ro,z
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
