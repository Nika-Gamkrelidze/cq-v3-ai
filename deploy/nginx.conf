server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API reverse proxy: external /api/calls -> internal api:8000/calls
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Push-to-deploy webhook: proxied to the host-side receiver (cqdeploy, port 9000)
    # over the existing port 80 — no extra firewall port. The receiver validates the
    # GitHub HMAC-SHA256 signature; unsigned/invalid requests are rejected there.
    location = /gh-webhook {
        proxy_pass http://host.docker.internal:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass_request_headers on;
    }
}
