# ---- HTTPS (ai.communiq.ge) ----
server {
    listen 443 ssl;
    http2 on;
    server_name ai.communiq.ge;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:5m;
    ssl_session_timeout 1h;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API reverse proxy: external /api/calls -> internal api:8000/calls
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Push-to-deploy webhook -> host-side receiver (HMAC-validated there).
    location = /gh-webhook {
        proxy_pass http://host.docker.internal:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass_request_headers on;
    }
}

# ---- HTTP ----
# Serves the ACME renewal challenge, and (for now) still serves the app so nothing
# breaks while we confirm 443 is reachable. A redirect to HTTPS is added once verified.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Let's Encrypt HTTP-01 renewal challenge (served from the webroot).
    location ^~ /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /gh-webhook {
        proxy_pass http://host.docker.internal:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass_request_headers on;
    }
}
