# HTTPS (443) is enabled at container start ONLY if TLS certs are present in
# /etc/nginx/certs — see deploy/enable-tls.sh + deploy/tls-ssl.conf. That keeps the
# stack working locally / on a fresh clone (HTTP only) while the server serves HTTPS.
include /etc/nginx/tls-enabled/*.conf;

# ---- HTTP: production domain -> force HTTPS ----
# Only matches requests whose Host is ai.communiq.ge (i.e. real public traffic), so local
# dev (localhost) and the fallback below are unaffected. The ACME renewal challenge is still
# served over HTTP here so certbot can renew.
server {
    listen 80;
    server_name ai.communiq.ge;

    location ^~ /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://ai.communiq.ge$request_uri;
    }
}

# ---- HTTP: everything else (localhost, the IP, fresh clone with no cert) -> serve over HTTP ----
server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location ^~ /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API reverse proxy: external /api/calls -> internal api:8000/calls
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Push-to-deploy webhook -> host-side receiver (HMAC-validated there).
    location = /gh-webhook {
        proxy_pass http://host.docker.internal:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass_request_headers on;
    }
}
